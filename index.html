<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>חידון זיהוי - בוגרי קרית גת</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Heebo', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0d3b31 0%, #1a5c4e 50%, #2d5a27 100%);
      background-attachment: fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: rgba(255, 255, 255, 0.98);
      width: 100%;
      max-width: 500px;
      padding: 40px 30px;
      border-radius: 40px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.4);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .btn-small {
      background: #bdc3c7; 
      color: #2c3e50; 
      border: none; 
      border-radius: 12px;
      font-size: 14px; 
      cursor: pointer; 
      padding: 8px 16px; 
      font-weight: 700;
      transition: all 0.3s ease; 
      align-self: flex-end; 
      margin-bottom: 20px;
    }

    .progress-container {
      width: 100%; height: 10px; background-color: #f1f3f5;
      border-radius: 10px; margin-bottom: 20px; overflow: hidden;
    }

    .progress-bar {
      height: 100%; background: #1a5c4e; width: 0%; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    h1 { font-size: 32px; font-weight: 900; color: #2c3e50; margin-bottom: 10px; text-align: center; }
    .subtitle { font-size: 18px; color: #7f8c8d; text-align: center; margin-bottom: 20px; font-weight: 400; }
    
    .names-list-container {
      background: #f8f9fa;
      border-radius: 20px;
      padding: 15px;
      margin-bottom: 25px;
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid #eee;
    }
    
    .names-list-title {
      font-size: 14px;
      font-weight: 800;
      color: #1a5c4e;
      margin-bottom: 12px;
      text-align: center;
      text-transform: uppercase;
    }

    .names-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
    }

    .name-item {
      flex: 0 1 calc(33.333% - 6px);
      min-width: 80px;
      font-size: 11px;
      color: #444;
      background: white;
      padding: 6px 4px;
      border-radius: 6px;
      text-align: center;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      border: 1px solid #f0f0f0;
      line-height: 1.2;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
    }

    #questionNumber { font-weight: 800; font-size: 18px; margin-bottom: 15px; text-align: center; color: #1a5c4e; }

    #question {
      font-size: 26px; font-weight: 800; color: #2c3e50; text-align: center;
      margin-bottom: 60px; min-height: 100px; display: flex; align-items: center; justify-content: center;
      line-height: 1.3;
    }

    .button-row { display: flex; gap: 15px; justify-content: center; }

    .btn {
      color: white; border: none; border-radius: 20px; padding: 15px;
      font-size: 24px; font-weight: 800; cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); flex: 1; min-height: 80px;
    }

    .btn-yes { background: linear-gradient(135deg, #0a3d31 0%, #1a5c4e 100%); box-shadow: 0 10px 20px rgba(10, 61, 49, 0.2); }
    .btn-no { background: linear-gradient(135deg, #7b1d1d 0%, #a52a2a 100%); box-shadow: 0 10px 20px rgba(123, 29, 29, 0.2); }
    .btn:hover { transform: scale(1.05); }

    #restartBtn { background: #c0392b; margin-top: 20px; width: 100%; display: none; font-weight: 800; }

    .result-display {
      text-align: center;
      animation: zoomIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes zoomIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .profile-image-large {
      width: 240px; 
      height: 240px;
      border-radius: 50%;
      object-fit: cover;
      border: 6px solid #1a5c4e;
      margin: 0 auto 25px;
      display: block;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    }

    .winner-label {
      font-size: 16px;
      color: #7f8c8d;
      margin-bottom: 5px;
      font-weight: 400;
    }

    .winner-name {
      font-size: 42px;
      font-weight: 900;
      color: #1a5c4e;
      margin-bottom: 10px;
      line-height: 1.1;
      letter-spacing: -1px;
    }

    #introScreen { display: block; }
    #quizScreen { display: none; }
    #resultScreen { display: none; }
  </style>
</head>
<body>

<div class="container" id="mainContainer">
  <div id="introScreen">
    <h1> בחר בחור מהשיעור</h1>
    <div class="subtitle">ש"ג פ"א ישי"ק קרית גת</div>
    
    <div class="names-list-container">
      <div class="names-list-title">רשימת הבחורים :</div>
      <div id="namesGrid" class="names-grid">
      </div>
    </div>

    <button class="btn btn-yes" style="width:100%" onclick="startQuiz()">🔥 בואו נתחיל!</button>
  </div>

  <div id="quizScreen">
    <button id="backBtn" class="btn-small" onclick="goBack()" style="visibility:hidden;">↩️ חזור</button>
    <div id="progressArea">
      <div class="progress-container"><div id="progressBar" class="progress-bar"></div></div>
      <div id="questionNumber"></div>
    </div>

    <h2 id="question">טוען...</h2>
    
    <div class="button-row" id="actionButtons">
      <button class="btn btn-yes" onclick="answer('yes')">כן</button>
      <button class="btn btn-no" onclick="answer('no')">לא</button>
    </div>
  </div>

  <div id="resultScreen">
    <div id="resultContent" class="result-display"></div>
    <button class="btn" id="restartBtn" onclick="goToMainScreen()">🔄 נסה שוב</button>
  </div>
</div>

<script>

                    q: "תושב הדרום?",

                    },
                    no: {

                    }
                },

                    yes: {

                    },
                    no: {

            },

                yes: {

                    yes: {

                    },
                    no: {

                        yes: "צביקי קנלסקי",
                        no: "מנחם רוזנברג ב''ש"
                    }
                },
                no: {
                    q: "בן של שליח (בעבר או בהווה)?",
                    yes: {
                        q: "אזרח אמריקאי?",
                        yes: "מנחם ירס",
                        no: "שניאור קורץ"
                    },
                    no: {
                        q: "אזרח אמריקאי?",
                        yes: "מוישי ואלפין",
                        no: "איציק בינשטוק"
                    }
                }
            }
        },
        no: {
            q: "דובר שפה נוספת?",
            yes: {
                q: "סיים קבוצה פ''ה?",
                yes: {
                    q: "בן של שליח (בעבר או בהווה)?",
                    yes: {
                        q: "אזרח אמריקאי?",
                        yes: "שמחה קרעמר",
                        no: "יוסי גושן"
                    },
                    no: {
                        q: "אזרח אמריקאי?",
                        yes: "ישראל פרץ",
                        no: "יוסי ממוט"
                    }
                },
                no: {
                    q: "האם הוא בכור?",
                    no: {
                        q: "אזרח אמריקאי?",
                        yes: "דובי חזן",
                        no: "שולם אוסטרובסקי"
                    },
                    yes: "אלימלך קרקוביץ"
                }
            },
            no: {
                q: "מוצא מזרחי?",
                yes: {

                    no: {

                        yes: "ישי ביטון",

                    }
                },
                no: {
                    q: "תושב הדרום?",
                    yes: {

                    },

                    }
                }
            }
        }
    },
    no: {
        q: "קבוצה פה?",
        yes: {
            q: "שליח או מדריך בישיבה?",
            yes: {
                q: "אזרח אמריקאי?",
                yes: {

                    yes: {

                    },
                    no: {

                    }
                },
                no: {
                    q: "בכור?",
                    yes: {

                    },
                    no: {

                        no: "מענדי בינשטוק"
                    }
                }
            },
            no: {
                q: "האם הוא כהן / לוי?",
                yes: {
                    q: "אזרח אמריקאי?",
                    yes: {
                        q: "בן של שליח?",
                        yes: "יענקול פרידמן",
                        no: "מוישי וינפלד"
                    },
                    no: "שימי סגל"
                },
                no: {
                    q: "האם הוא מדבר בבית שפה נוספת חוץ מעברית?",
                    yes: {

                    },
                    no: {

                    }

            }
        },
        no: {
            q: "מוצא מזרחי?",
            yes: {
                q: "נמצא עכשיו בקבוצה פ''ו?",

                    yes: "שניאור ציפורי",
                    no: {

                    }
                },
                no: {

                    yes: {

                    },
                    no: {

                        yes: "חיים מאיר ביטון",
                        no: "מענדי מוטולה"
                    }
                }
            },
            no: {
                q: "בן של שליח?",
                yes: {
                    q: "דובר שפה נוספת?",
                    yes: "זלמן טברדוביץ",
                    no: {
                        q: "בוגר קרית אתא?",
                        yes: "מענדי קישון",
                        no: "מענדי מושקוביץ"
                    }
                },
                no: {
                    q: "בכור?",
                    yes: "יעקב ניימן",
                    no: {
                        q: "מגדליסט?",
                        yes: "שמוליק ליפשיץ",
                        no: "מענדי רוזנברג ב''ב"
                    }
                }
            }
        }
    }
};

let currentNode;
let pathStack = [];
const EXPECTED_STEPS = 6;

function getAllNames(node, namesList = []) {
  if (typeof node === "string") {
    namesList.push(node);
  } else {
    if (node.yes) getAllNames(node.yes, namesList);
    if (node.no) getAllNames(node.no, namesList);
  }
  return namesList;
}

function getLastName(fullName) {
  const parts = fullName.trim().split(/\s+/);
  if (parts.length === 0) return "";
  
  const lastPart = parts[parts.length - 1];
  if ((lastPart.includes("''") || lastPart.includes('"')) && parts.length > 2) {
      return parts[parts.length - 2];
  }
  return lastPart;
}

function sortNamesByLastName(names) {
  return names.sort((a, b) => {
    const lastA = getLastName(a);
    const lastB = getLastName(b);
    return lastA.localeCompare(lastB, 'he');
  });
}

window.onload = function() {
  let allNames = [...new Set(getAllNames(tree))];
  allNames = sortNamesByLastName(allNames);
  
  const grid = document.getElementById("namesGrid");
  allNames.forEach(name => {
    const div = document.createElement("div");
    div.className = "name-item";
    div.innerText = name;
    grid.appendChild(div);
  });
};

function startQuiz() {
  document.getElementById("introScreen").style.display = "none";
  document.getElementById("resultScreen").style.display = "none";
  document.getElementById("quizScreen").style.display = "block";
  restart();
}

function goToMainScreen() {
  document.getElementById("resultScreen").style.display = "none";
  document.getElementById("quizScreen").style.display = "none";
  document.getElementById("introScreen").style.display = "block";
}

function updateProgress() {
  const percentage = Math.min((pathStack.length / EXPECTED_STEPS) * 100, 100);
  document.getElementById("progressBar").style.width = percentage + "%";
}

function showQuestion() {
  const questionEl = document.getElementById("question");
  const numberEl = document.getElementById("questionNumber");
  const quizScreen = document.getElementById("quizScreen");
  const resultScreen = document.getElementById("resultScreen");
  const resultContent = document.getElementById("resultContent");
  const backBtn = document.getElementById("backBtn");
  
  updateProgress();
  
  if (typeof currentNode === "string") {
    document.getElementById("progressBar").style.width = "100%";
    quizScreen.style.display = "none";
    resultScreen.style.display = "block";
    
    // מעדכן את הסיומת ל-JPG באותיות גדולות כפי שמופיע ב-GitHub שלך
    const imagePath = `pics/${currentNode}.JPG`;
    
    resultContent.innerHTML = `
      <img src="${imagePath}" class="profile-image-large" 
           onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(currentNode)}&background=1a5c4e&color=fff&size=240'" 
           alt="${currentNode}">
      <div class="winner-label">הבחור שחשבת עליו הוא:</div>
      <div class="winner-name">${currentNode}</div>
      <div style="font-size: 24px;">🎯</div>
    `;
    
    document.getElementById("restartBtn").style.display = "block";
  } else {
    resultScreen.style.display = "none";
    quizScreen.style.display = "block";
    
    numberEl.innerText = `שאלה ${pathStack.length + 1}`;
    questionEl.innerText = currentNode.q;
    backBtn.style.visibility = pathStack.length > 0 ? "visible" : "hidden";
  }
}

function answer(response) {
  if (currentNode[response]) {
    pathStack.push(currentNode);
    currentNode = currentNode[response];
    showQuestion();
  }
}

function goBack() {
  if (pathStack.length > 0) {
    currentNode = pathStack.pop();
    showQuestion();
  }
}

function restart() {
  currentNode = tree;
  pathStack = [];
  showQuestion();
}
</script>
</body>
</html>
