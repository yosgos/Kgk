<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>חידון זיהוי - בוגרי קרית גת</title>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;800&family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #10b981;
      --primary-dark: #059669;
      --secondary: #fbbf24;
      --accent: #f43f5e;
      --bg-gradient: linear-gradient(135deg, #065f46 0%, #10b981 100%);
      --card-bg: rgba(255, 255, 255, 0.95);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Assistant', 'Heebo', sans-serif;
      min-height: 100vh;
      background: var(--bg-gradient);
      background-attachment: fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden; /* מונע גלילה מיותרת בגלל העיגולים */
    }

    /* עיצוב העיגולים הצפים ברקע */
    .bubbles-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .bubble {
      position: absolute;
      bottom: -150px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 50%;
      animation: rise 15s infinite ease-in;
    }

    @keyframes rise {
      0% { bottom: -150px; transform: translateX(0) rotate(0deg); opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 1; }
      100% { bottom: 110vh; transform: translateX(100px) rotate(360deg); opacity: 0; }
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    .container {
      background: var(--card-bg);
      width: 100%;
      max-width: 480px;
      padding: 35px 25px;
      border-radius: 35px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      position: relative;
      z-index: 10;
      border: 4px solid white;
      animation: float 6s ease-in-out infinite;
    }

    .btn-small {
      background: #e2e8f0; 
      color: #475569; 
      border: none; 
      border-radius: 50px;
      font-size: 14px; 
      cursor: pointer; 
      padding: 6px 16px; 
      font-weight: 700;
      transition: all 0.2s;
      margin-bottom: 15px;
    }

    .progress-container {
      width: 100%; height: 12px; background-color: #f1f5f9;
      border-radius: 20px; margin-bottom: 25px; overflow: hidden;
      border: 1px solid #e2e8f0;
    }

    .progress-bar {
      height: 100%; 
      background: linear-gradient(90deg, var(--secondary), var(--primary));
      width: 0%; 
      transition: width 0.4s ease-out;
    }

    h1 { 
      font-size: 34px; 
      font-weight: 900; 
      color: #064e3b; 
      margin-bottom: 8px; 
      text-align: center;
    }

    .subtitle { 
      font-size: 18px; 
      color: #374151; 
      text-align: center; 
      margin-bottom: 25px; 
      font-weight: 600;
      background: #fef3c7;
      padding: 5px 15px;
      border-radius: 50px;
      display: inline-block;
    }
    
    .names-list-container {
      margin-bottom: 25px;
      max-height: 200px;
      overflow-y: auto;
      padding: 5px;
    }

    .names-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
    }

    .name-item {
      flex: 0 1 calc(33.333% - 6px);
      font-size: 11px;
      color: #064e3b;
      background: rgba(255, 255, 255, 0.6);
      padding: 6px 4px;
      border-radius: 10px;
      text-align: center;
      border: 1px solid #d1fae5;
      font-weight: 600;
    }

    #questionNumber { 
      font-weight: 800; 
      font-size: 16px; 
      margin-bottom: 10px; 
      text-align: center; 
      color: var(--primary-dark);
    }

    .question-box {
      min-height: 160px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 30px;
      text-align: center;
    }

    .question-icon {
      font-size: 48px;
      margin-bottom: 15px;
    }

    #question {
      font-size: 22px; 
      font-weight: 400; 
      color: #1f2937; 
      line-height: 1.4;
    }

    .button-row { display: flex; gap: 15px; justify-content: center; }

    .btn {
      color: white; border: none; border-radius: 25px; padding: 15px;
      font-size: 26px; font-weight: 900; cursor: pointer;
      transition: all 0.2s; flex: 1; min-height: 75px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 15px rgba(0,0,0,0.1);
      position: relative;
      top: 0;
    }

    .btn:active { top: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

    .btn-yes { background: var(--primary); }
    .btn-no { background: var(--accent); }

    .profile-image-container {
      position: relative;
      width: 180px;
      height: 180px;
      margin: 0 auto 20px;
    }

    .profile-image-large {
      width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
      border: 6px solid white; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      position: relative; z-index: 2;
    }

    .winner-name { font-size: 38px; font-weight: 900; color: #064e3b; margin-bottom: 10px; }

    #confetti-canvas {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 999; display: none;
    }

    #introScreen, #quizScreen, #resultScreen { display: none; }
    #introScreen { display: block; }
  </style>

let currentNode;
let pathStack = [];

// יצירת העיגולים המעוצבים ברקע
function createBubbles() {
    const container = document.getElementById('bubblesContainer');
    const bubbleCount = 12;
    for (let i = 0; i < bubbleCount; i++) {
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        const size = Math.random() * 100 + 50;
        bubble.style.width = size + 'px';
        bubble.style.height = size + 'px';
        bubble.style.left = Math.random() * 100 + '%';
        bubble.style.animationDelay = Math.random() * 8 + 's';
        bubble.style.animationDuration = (Math.random() * 7 + 10) + 's';
        container.appendChild(bubble);
    }
}

function fireConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  canvas.style.display = 'block';
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  let particles = [];
  const colors = ['#f1c40f', '#2ecc71', '#3498db', '#e74c3c'];
  for (let i = 0; i < 80; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      size: Math.random() * 8 + 4,
      color: colors[Math.floor(Math.random() * colors.length)],
      speed: Math.random() * 5 + 2,
      angle: Math.random() * 6.28
    });
  }
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach((p) => {
      p.y += p.speed;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size/2, 0, Math.PI * 2);
      ctx.fill();
    });
    if (particles.length > 0 && particles[0].y < canvas.height) requestAnimationFrame(animate);
    else canvas.style.display = 'none';
  }
  animate();
}

function getAllNames(node, namesList = []) {
  if (typeof node === "string") namesList.push(node);
  else {
    if (node.yes) getAllNames(node.yes, namesList);
    if (node.no) getAllNames(node.no, namesList);
  }
  return namesList;
}

window.onload = function() {
  createBubbles();
  let allNames = [...new Set(getAllNames(tree))].sort();
  const grid = document.getElementById("namesGrid");
  allNames.forEach(name => {
    const div = document.createElement("div");
    div.className = "name-item";
    div.innerText = name;
    grid.appendChild(div);
  });
};

function startQuiz() {
  document.getElementById("introScreen").style.display = "none";
  document.getElementById("quizScreen").style.display = "block";
  restart();
}

function goToMainScreen() {
  document.getElementById("resultScreen").style.display = "none";
  document.getElementById("introScreen").style.display = "block";
}

function showQuestion() {
  const quizScreen = document.getElementById("quizScreen");
  const resultScreen = document.getElementById("resultScreen");
  const resultContent = document.getElementById("resultContent");
  const backBtn = document.getElementById("backBtn");
  const questionEl = document.getElementById("question");
  const iconEl = document.getElementById("icon");
  const bar = document.getElementById("progressBar");
  
  bar.style.width = (pathStack.length * 15) + "%";
  
  if (typeof currentNode === "string") {
    bar.style.width = "100%";
    quizScreen.style.display = "none";
    resultScreen.style.display = "block";
    resultContent.innerHTML = `
      <div class="profile-image-container">
        <img src="pics/${currentNode.replace(/"/g, "'")}.JPG" class="profile-image-large" 
             onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(currentNode)}&background=10b981&color=fff&size=200'" 
             alt="${currentNode}">
      </div>
      <div class="winner-name">${currentNode}</div>
      <div style="font-size: 30px;">מצאתי! 🎊</div>
    `;
    fireConfetti();
  } else {
    resultScreen.style.display = "none";
    quizScreen.style.display = "block";
    document.getElementById("questionNumber").innerText = `שאלה ${pathStack.length + 1}`;
    questionEl.innerText = currentNode.q;
    iconEl.innerText = currentNode.icon || "🤔";
    backBtn.style.visibility = pathStack.length > 0 ? "visible" : "hidden";
  }
}

function answer(response) {
  pathStack.push(currentNode);
  currentNode = currentNode[response];
  showQuestion();
}

function goBack() {
  if (pathStack.length > 0) {
    currentNode = pathStack.pop();
    showQuestion();
  }
}

function restart() {
  currentNode = tree;
  pathStack = [];
  showQuestion();
}
